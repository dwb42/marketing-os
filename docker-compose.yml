services:
  postgres:
    image: postgres:16
    container_name: marketing-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketing_os
    ports:
      - "5432:5432"
    volumes:
      - marketing_os_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketing_os"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  marketing_os_pgdata:
